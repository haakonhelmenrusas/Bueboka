name: Build and Submit Preview

on:
  push:
    branches: [dev]

jobs:
  build_ios:
    name: Build iOS Preview
    type: build
    params:
      platform: ios
      profile: preview

  build_android:
    name: Build Android Preview
    type: build
    params:
      platform: android
      profile: preview

  submit_ios:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: preview

  submit_android:
    name: Submit to Google Play Internal
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: preview

